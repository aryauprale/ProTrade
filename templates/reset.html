{% extends "layout.html" %}
{% block title %}Reset Password{% endblock %}

{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='reset.css') }}">
{% endblock %}

{% block content %}
<section class="reset-page">
  <div class="reset-card">
    <div class="reset-header">
      <p class="reset-eyebrow">Account recovery</p>
      <h1>Reset your password</h1>
      <p class="reset-subtext">
        Enter your phone number and OTP code to continue the password reset process.
      </p>
    </div>

    <form method="POST" action="{{ url_for('reset') }}" class="reset-form">
      <div class="input-group">
        <label for="phone">Phone Number</label>
        <div class="input-wrap">
          <input
            id="phone"
            type="tel"
            name="phone"
            placeholder="e.g. 5551234567"
            required
            autocomplete="tel"
          >
        </div>
      </div>

      <div class="input-group">
        <label for="otp">OTP Code</label>
        <div class="input-wrap">
          <input
            id="otp"
            type="text"
            name="otp"
            inputmode="numeric"
            pattern="[0-9]{4,8}"
            placeholder="Enter OTP code"
            required
          >
        </div>
      </div>

      <button type="submit" class="reset-submit">Next</button>
    </form>
  </div>
</section>
{% endblock %}
