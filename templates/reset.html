{% extends "layout.html" %}
{% block title %}Reset Password{% endblock %}

{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='style2.css') }}">
{% endblock %}

{% block content %}
<div class="reset-box">
  <form method="POST" action="{{ url_for('reset') }}">
    <h2>Reset Password</h2>
    <p>Enter your phone number and we will send you a code to reset your password.</p>

    <div class="input-box">
      <input type="tel" name="phone" placeholder="e.g., 5551234567" required>
      <label>Cell number</label>
    </div>

    <div class="input-box">
      <input type="text" name="otp" inputmode="numeric" pattern="[0-9]{4,8}" placeholder="Enter OTP code" required>
      <label>OTP Code</label>
    </div>

    <button type="submit" class="next-btn">Next</button>
  </form>
</div>
{% endblock %}
