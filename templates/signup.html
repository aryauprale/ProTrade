{% extends "layout.html" %}
{% block title %}Sign Up{% endblock %}

{% block page_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
{% endblock %}

{% block content %}
<div class="auth">
  <div class="auth-card">
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Start building your portfolio with ProTrade.</p>

    <form method="POST" action="{{ url_for('signup') }}" class="auth-form">
      <div class="grid">
        <div class="field">
          <label for="first_name">First Name</label>
          <input id="first_name" type="text" name="first_name" required autocomplete="given-name">
        </div>

        <div class="field">
          <label for="last_name">Last Name</label>
          <input id="last_name" type="text" name="last_name" required autocomplete="family-name">
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required autocomplete="email">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required minlength="8" autocomplete="new-password">
        <p class="hint">Use 8+ characters.</p>
      </div>

      <label class="checkbox">
        <input type="checkbox" name="terms" required>
        <span>I agree to ProTrade’s <a href="#">Terms</a> & <a href="#">Privacy Policy</a></span>
      </label>
      <div class="field">
      <label for="username">Username</label>
     <input id="username" type="text" name="username" required minlength="3" autocomplete="username">
    </div>

   <div class="field">
    <label for="phone">Phone Number</label>
    <input id="phone" type="tel" name="phone" required
         placeholder="e.g., 5551234567"
         autocomplete="tel">
    </div>

      <button type="submit" class="btn-primary">Create account</button>

      <p class="auth-footer">
        Already have an account? <a href="{{ url_for('login') }}">Log in</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
