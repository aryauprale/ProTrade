<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style04.css">
    <script src="script04.js" defer></script>
    
    <title>buy-sell</title>
</head>
<body>
    <div class="order-card">
        <div class="header">
            <span class="symbol">AAPL</span>
            <span class="price" id="current-price"> $182.45 <small>+1.2%</small></span>
        </div>

        <div class="form-group">
            <label for="order-type">Order Type</label>
         <select id="order-type">
            // an instruction to buy or sell immediately at the best current price
            <option value="market">Market Order</option>
            // an instruction to buy or sell at a specifi price or better
            <option value="limit">Limit Order</option>
         </select>
        </div>
            <div class="form-group">
            <label for="shares">Quantity (Shares)</label>
            <input type="number" id="shares" placeholder="0" min="1">
            </div>
        <div class="form-group">
            <label for="limit-price">Limit Price ($)</label>
            <input type="number" id="limit-price" value="182.45" step="0.01">
        </div>
        <div class="button-group">
            <button id="buy-btn" class="btn btn-buy">BUY</button>
            <button id="sell-btn" class="btn btn-sell">SELL</button>
        <div>
        <div class="estimate">
            Estimated Total: <span id="total">$0.00</span>
         </div>
       
    </div>
    
</body>
</html>
