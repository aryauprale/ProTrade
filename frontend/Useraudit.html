<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style04.css">
    <script src="script04.js" defer></script>
    <title>User-Audit</title>
</head>
<body>
    <div class="audit-wrapper">
        <a href="admin2.html" class="btn-back">Back to Dashboard</a>

            <header class="audit-header">
                <h1>User Account Audit</h1>
                <div class="search-box">
                    <input type="text" id="userSearch" onkeyup="filterUsers"()" placeholder="Search users...">
                </div>
            </header>

            <div class="audit-status">
                <div class="card">
                    <span class="label">Flagged Account</span>
                    <span class="value warning" id="flaggedCount">0</span>
                </div>
            </div>
            <div class="tabel-container">
                <table>
                    <thead>
                        <tr> 
                            <th>User ID</th>
                            <th>Name</th>
                            <th>Last Action</th>
                            <th>Status</th>
                            <th>Balance</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="audit-body">
                    </tbody>
                </table>
            </div>
    </div>
</body>
</html>
