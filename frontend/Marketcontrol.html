<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <link rel="stylesheet" href="style04.css">
    <script src="script04.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventroycont</title>
</head>
<body>
    <div class="market-wrapper">
        <a href="admin2.html" class="btn-back">Back to Dashboard</a>

        <header class="market-header">
            <h1>Market Control Center</h1>
            <div id="market-status-indicator" class="status-open">Market OPEN</div>
        </header>

        <div class="control-gird">
            <section class="control-card emergency">
                <h3>Global Kill-Switch</h3>
                <p>Immediately halt all trading accross the platform.</p>
                <button id="haltBtn" onclick="toggleMarket()">Halt Trading</button>
            </section>
            <section class="control-card">
                <h3>Price Adjustment</h3>
                <label>Current Base Price ($)</label>
                <input type="number" id="basePriceInput" step="0.01" value="150.00">
                <button class="btn-update" onclick="updateGlobalPrice()">Push Price Update</button>
                <p class="hint">This will update the price for all active traders live.</p>
            </section>
            <section class="control-card full-width">
                <h3>Active Tickers</h3>
                <table id="ticerTable">
                    <thead>
                        <tr>
                            <th>Symbol</th>
                            <th>Company Name</th>
                            <th>Volatility</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tickerBody">
                            </tbody>
                </table>
            </section>
                
        </div>
    </div>
</body>
</html>
